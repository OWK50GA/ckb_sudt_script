name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Check + Clippy (fast feedback, no cross-compilation needed) ────────────
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.95.0 (needed by ckb-testtool host deps)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-

      - name: cargo fmt --check
        run: cargo +1.95.0 fmt --all -- --check

      - name: cargo check (workspace)
        run: cargo +1.95.0 check --workspace

      - name: cargo clippy (workspace)
        run: cargo +1.95.0 clippy --workspace -- -D warnings

  # ── Build all RISC-V contract binaries ────────────────────────────────────
  build-contracts:
    name: Build Contracts (RISC-V)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
          targets: riscv64imac-unknown-none-elf

      - name: Install LLVM / Clang
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang llvm

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-riscv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-riscv-

      - name: Build all contracts
        run: make build
        env:
          CLANG: clang
          TARGET_CC: clang
          TARGET_AR: llvm-ar

      - name: Upload contract binaries
        uses: actions/upload-artifact@v4
        with:
          name: contract-binaries
          path: build/release/
          retention-days: 7

  # ── Run integration tests (depends on the built binaries) ─────────────────
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.95.0 (needed by ckb-testtool host deps)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Download contract binaries
        uses: actions/download-artifact@v4
        with:
          name: contract-binaries
          path: build/release/

      - name: Make binaries executable
        run: chmod +x build/release/*

      - name: Run tests
        run: cargo +1.95.0 test --package tests

  # ── Build the deployer (host target, no cross-compilation) ────────────────
  build-deployer:
    name: Build Deployer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"

      - name: Install OpenSSL (required by reqwest in ckb-sdk)
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deployer-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-deployer-

      - name: Build deployer
        run: cargo build -p deployer

      - name: Build keygen
        run: cargo build --bin keygen
